{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
    <h2>Login</h2>
    <p class="muted">Use your role account to continue.</p>
    <form method="post" class="form-grid">
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>
        <button type="submit">Sign In</button>
    </form>
    <p class="muted small">New user? <a href="{{ url_for('register') }}">Create an account</a></p>
</section>
{% endblock %}
