{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
    <h2>Create Account</h2>
    <p class="muted">Register as a farmer or admin.</p>
    <form method="post" class="form-grid">
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>
        <label>Confirm Password
            <input type="password" name="confirm_password" required>
        </label>
        <label>Role
            <select name="role" required>
                <option value="farmer">farmer</option>
                <option value="admin">admin</option>
            </select>
        </label>
        <label>Admin Registration Code (only if role is admin)
            <input type="password" name="admin_code" placeholder="Required for admin signup">
        </label>
        <button type="submit">Sign Up</button>
    </form>
    <p class="muted small">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
</section>
{% endblock %}
